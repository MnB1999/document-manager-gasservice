spring:
  datasource:

    url: ${DB_URL}
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  notifications:
    recipient-email: ${NOTIFICATION_RECIPIENT}

supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}

